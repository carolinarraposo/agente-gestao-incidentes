name: Import Context Data

on:
  repository_dispatch:
    types: [new-extraction-data]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout agent repository
        uses: actions/checkout@v4

      - name: Checkout extraction repository
        uses: actions/checkout@v4
        with:
          repository: carolinarraposo/extracao-dados-covilha
          token: ${{ secrets.AGENT_REPO_TOKEN }}
          path: extracao_dados_covilha

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate extraction data exists
        run: |
          if [ ! -d "extracao_dados_covilha/data/raw" ]; then
            echo "Pasta data/raw não encontrada"
            exit 1
          fi
          echo "Dados encontrados — pronto para importar"
          ls extracao_dados_covilha/data/raw/

      - name: Run context import (dry-run validation)
        env:
          EXTRACTION_RAW_PATH: ${{ github.workspace }}/extracao_dados_covilha/data/raw
        run: python import_context.py --force